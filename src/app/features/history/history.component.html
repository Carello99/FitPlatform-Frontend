<!-- Template storico allenamenti -->
<div class="screen-pad screen-anim">

  <!-- ===== HEADER ===== -->
  <div class="appbar">
    <button class="iconbtn" (click)="back()" aria-label="Indietro"><i class="ti ti-chevron-left" style="font-size:22px" aria-hidden="true"></i></button>
    <div class="grow">
      <h1>Storico</h1>
      <!-- w.history.length: conta gli allenamenti nel store -->
      <div class="sub">{{ w.history.length }} allenamenti recenti</div>
    </div>
  </div>

  <!-- ===== BAND STATISTICHE RIASSUNTIVE ===== -->
  <div class="card card-pad" style="margin-top:16px;display:flex;justify-content:space-around;text-align:center">
    <!-- band è un array di tuple [valore, etichetta] -->
    <!-- b[0] = valore, b[1] = etichetta -->
    @for (b of band; track b[1]) {
      <div>
        <div style="font-size:22px;font-weight:800;letter-spacing:-0.5px">{{ b[0] }}</div>
        <div style="font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:2px">{{ b[1] }}</div>
      </div>
    }
  </div>

  <!-- ===== CHIP DI FILTRO ===== -->
  <div class="scroll-x" style="margin-top:16px">
    @for (f of filters; track f) {
      <button class="chip" [class.active]="filter() === f" (click)="filter.set(f)">{{ f }}</button>
    }
  </div>

  <!-- ===== LISTA ALLENAMENTI ===== -->
  <!-- Animazione sfasata: ogni card appare con un ritardo di 50ms × indice -->
  <div class="col gap12" style="margin-top:18px">
    @for (h of w.history; track $index) {
      <!-- [style.animation]: animazione "rise" con delay calcolato dall'indice $index -->
      <div class="card" style="padding:16px;display:flex;gap:14px;align-items:center"
        [style.animation]="'rise 0.4s cubic-bezier(.16,1,.3,1) ' + ($index * 0.05) + 's backwards'">
        <!-- Icona della scheda con colore dell'accento -->
        <div class="itile" [class]="TILE_CLASS[h.accent]" style="width:52px;height:52px"><i class="ti" [class]="h.icon" style="font-size:25px" aria-hidden="true"></i></div>
        <div class="grow" style="min-width:0">
          <div style="font-size:15px;font-weight:800">{{ h.name }}</div>
          <div style="font-size:12px;color:var(--ink-3);font-weight:600;margin-top:2px">{{ h.date }}</div>
          <!-- Statistiche: durata, volume, numero esercizi -->
          <div class="row gap12" style="margin-top:8px;font-size:11.5px;font-weight:700;color:var(--ink-2)">
            <span class="row" style="gap:4px"><i class="ti ti-clock" style="font-size:13px;color:var(--ink-3)" aria-hidden="true"></i>{{ h.dur }}</span>
            <span class="row" style="gap:4px"><i class="ti ti-weight" style="font-size:13px;color:var(--ink-3)" aria-hidden="true"></i>{{ h.vol }}</span>
            <span class="row" style="gap:4px"><i class="ti ti-list-numbers" style="font-size:13px;color:var(--ink-3)" aria-hidden="true"></i>{{ h.ex }}</span>
          </div>
        </div>
        <!-- Freccia destra decorativa (navigazione non implementata) -->
        <i class="ti ti-chevron-right" style="font-size:20px;color:var(--ink-4)" aria-hidden="true"></i>
      </div>
    }
  </div>
</div>
