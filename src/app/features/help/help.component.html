<!-- Template Help Desk -->
<div class="screen-pad screen-anim">

  <ff-app-header></ff-app-header>

  <!-- ===== HEADER ===== -->
  <div class="appbar">
    <button class="iconbtn" (click)="back()" aria-label="Indietro"><i class="ti ti-chevron-left" style="font-size:22px" aria-hidden="true"></i></button>
    <div class="grow">
      <h1>Help Desk</h1>
      <div class="sub">Siamo qui per te</div>
    </div>
  </div>

  <!-- ===== BARRA DI RICERCA (decorativa in questa demo) ===== -->
  <div class="input-icon" style="margin-top:16px">
    <i class="ti ti-search" aria-hidden="true"></i>
    <input class="input" placeholder="Come possiamo aiutarti?" />
  </div>

  <!-- ===== PULSANTI CHAT E EMAIL ===== -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px">
    <!-- chat.set(true): apre il bottom sheet della chat -->
    <button class="card" style="padding:14px;text-align:left" (click)="chat.set(true)">
      <div class="itile sm t-amber" style="margin-bottom:10px"><i class="ti ti-message-circle" style="font-size:20px" aria-hidden="true"></i></div>
      <div style="font-size:14.5px;font-weight:800">Chat di supporto</div>
      <div style="font-size:11.5px;color:var(--green);font-weight:700;margin-top:2px">● Online ora</div>
    </button>
    <!-- toast.show(...): mostra una notifica (simulazione apertura email) -->
    <button class="card" style="padding:14px;text-align:left" (click)="toast.show('Apertura email…', 'ti-mail')">
      <div class="itile sm t-cyan" style="margin-bottom:10px"><i class="ti ti-mail" style="font-size:20px" aria-hidden="true"></i></div>
      <div style="font-size:14.5px;font-weight:800">Contattaci</div>
      <div style="font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:2px">Risposta in 24h</div>
    </button>
  </div>

  <!-- ===== GUIDE RAPIDE (scroll orizzontale) ===== -->
  <div class="section-hdr"><h2>Guide rapide</h2></div>
  <div class="scroll-x">
    <!-- w.guides: array di guide dallo store (dal file mock JSON) -->
    @for (g of w.guides; track g.t) {
      <button class="card" style="width:150px;flex-shrink:0;padding:14px;text-align:left" (click)="toast.show('Apertura guida…', 'ti-book')">
        <div class="itile sm" [class]="TILE_CLASS[g.tile]" style="margin-bottom:12px"><i class="ti" [class]="g.icon" style="font-size:20px" aria-hidden="true"></i></div>
        <div style="font-size:14px;font-weight:800;line-height:1.25">{{ g.t }}</div>
        <div style="font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:3px">{{ g.s }}</div>
      </button>
    }
  </div>

  <!-- ===== FAQ ACCORDION ===== -->
  <div class="section-hdr"><h2>Domande frequenti</h2></div>
  <div class="col gap10">
    <!-- w.faq: array di domande/risposte dallo store -->
    <!-- let i = $index: indice per identificare la FAQ aperta -->
    @for (f of w.faq; track f.q; let i = $index) {
      <div class="card" style="padding:0;overflow:hidden">
        <!-- toggle(i): apre la FAQ i o la chiude se è già aperta -->
        <button class="row between" style="width:100%;padding:14px;text-align:left;gap:12px" (click)="toggle(i)">
          <span style="font-size:14px;font-weight:700;line-height:1.35">{{ f.q }}</span>
          <!-- Icona chevron: ruotata di 180° quando la FAQ è aperta -->
          <!-- [style.transform]: binding CSS per la rotazione dell'icona -->
          <i class="ti ti-chevron-down" style="font-size:19px;color:var(--ink-3);flex-shrink:0;transition:transform 0.25s" [style.transform]="open() === i ? 'rotate(180deg)' : 'none'" aria-hidden="true"></i>
        </button>
        <!-- Altezza animata: max-height 260 se aperta, 0 se chiusa -->
        <!-- Questo è un trucco CSS per animare l'apertura/chiusura senza JavaScript -->
        <div style="overflow:hidden;transition:max-height 0.32s cubic-bezier(.4,0,.2,1)" [style.max-height.px]="open() === i ? 260 : 0">
          <p style="padding:0 16px 16px;font-size:13.5px;color:var(--ink-3);font-weight:500;line-height:1.6;text-wrap:pretty">{{ f.a }}</p>
        </div>
      </div>
    }
  </div>

  <!-- ===== BOTTOM SHEET CHAT ===== -->
  <!-- Il velo e il top layer li mette ff-modal. -->
  <ff-modal [open]="chat()" (closed)="chat.set(false)">
    @if (chat()) {
      <div class="sheet">
        <div class="sheet-grip"></div>
        <div class="row gap10" style="margin-bottom:16px;align-items:center">
          <div class="itile sm t-amber"><i class="ti ti-headset" style="font-size:20px" aria-hidden="true"></i></div>
          <div class="grow">
            <div style="font-size:15px;font-weight:800">Supporto FitFlow</div>
            <div style="font-size:11.5px;color:var(--green);font-weight:700">● Online · risponde in pochi minuti</div>
          </div>
          <button (click)="chat.set(false)"><i class="ti ti-x" style="font-size:22px;color:var(--ink-3)" aria-hidden="true"></i></button>
        </div>

        <!-- Lista messaggi della chat -->
        <div class="col gap10" style="max-height:280px;overflow-y:auto;padding:4px 0">
          @for (m of msgs(); track $index) {
            <!-- [style.align-self]: messaggio dell'utente a destra, bot a sinistra -->
            <!-- [style.background]: giallo per l'utente, grigio per il bot -->
            <!-- [style.border-radius]: bordi asimmetrici per stile "fumetto" -->
            <div [style.align-self]="m.me ? 'flex-end' : 'flex-start'"
              [style.background]="m.me ? 'var(--amber)' : 'var(--surface-3)'"
              [style.color]="m.me ? 'var(--amber-ink)' : 'var(--ink)'"
              [style.border-radius]="m.me ? '18px 18px 5px 18px' : '18px 18px 18px 5px'"
              style="max-width:82%;padding:11px 15px;font-size:13.5px;font-weight:600;line-height:1.45">{{ m.t }}</div>
          }
        </div>

        <!-- Input messaggio + pulsante invio -->
        <div class="row gap8" style="margin-top:14px">
          <!-- [value]="draft()": mostra il testo corrente del signal -->
          <!-- (input)="onDraft($event)": aggiorna il signal ad ogni modifica -->
          <!-- (keydown.enter)="send()": invia con la tasto Enter -->
          <input class="input grow" placeholder="Scrivi un messaggio…" [value]="draft()" (input)="onDraft($event)" (keydown.enter)="send()" />
          <button class="btn btn-primary" style="padding:0 18px;border-radius:14px" (click)="send()"><i class="ti ti-send" style="font-size:20px" aria-hidden="true"></i></button>
        </div>
      </div>
    }
  </ff-modal>
</div>
