<!-- Header di sezione condiviso (brand + streak + avatar utente) -->
<ff-app-header style="padding:0 16px"></ff-app-header>

<!-- Header chat: avatar PT + nome (tap → scheda PT) -->
<header class="chat-hd">
  <button class="who press" (click)="toTrainer()">
    <span class="av" [style.background]="trainer.trainer.photoUrl ? 'transparent' : trainer.trainer.color">
      @if (trainer.trainer.photoUrl) { <img [src]="trainer.trainer.photoUrl" [alt]="trainer.trainer.name" /> }
      @else { {{ trainer.trainer.initials }} }
    </span>
    <span class="who-txt">
      <span class="nm">{{ trainer.trainer.name }}</span>
      <span class="rl">{{ trainer.trainer.role }} · <span class="dot"></span> online</span>
    </span>
  </button>
</header>

<!-- Bolle messaggi (scroll) -->
<div class="msgs" #scrollEl>
  @for (m of trainer.messages(); track m.id) {
    <div class="row" [class.me]="m.from === 'me'">
      <div class="bubble">
        <!-- Allegato: il piano alimentare arriva così, come foto mandate dal
             coach. Si aprono qui, dove sono state consegnate — la chat resta
             l'archivio di tutti quelli passati, la sezione Coach inchioda solo
             quello in vigore (D-46). -->
        @if (dietOf(m); as d) {
          <button class="att press" (click)="openDiet(d)">
            <span class="att-shots">
              @for (p of d.photos.slice(0, 3); track p) { <img [src]="p" alt="" /> }
            </span>
            <span class="att-txt">
              <span class="att-n">Piano alimentare</span>
              <span class="att-s">{{ d.photos.length === 1 ? '1 pagina' : d.photos.length + ' pagine' }} · tocca per leggere</span>
            </span>
          </button>
        }
        <span class="bt">{{ m.text }}</span>
        <span class="tm">{{ m.time }}</span>
      </div>
    </div>
  }

  <!-- Richieste aperte: la STESSA card dell'agenda, in densità chat.
       "Sposta" qui non apre nulla: porta in Agenda, dove c'è il calendario. -->
  @for (r of store.toAnswer(); track r.id) {
    <div class="row">
      <ff-request-card
        [req]="r"
        variant="chat"
        (accept)="accept($event)"
        (decline)="decline($event)"
        (counter)="toAgenda(r.payload.date)"
      />
    </div>
  }
</div>

<!-- Composer -->
<div class="composer">
  <textarea
    class="cin"
    rows="1"
    placeholder="Scrivi al tuo PT…"
    [value]="draft()"
    (input)="onInput($event)"
    (keydown)="onKeydown($event)"
  ></textarea>
  <button class="cbtn press" [disabled]="!draft().trim()" (click)="send()" aria-label="Invia">
    <i class="ti ti-send" aria-hidden="true"></i>
  </button>
</div>

<!-- Visore delle foto del piano: lo stesso della sezione Coach. -->
@if (diet(); as d) {
  <ff-photo-viewer
    [open]="true"
    [photos]="d.photos"
    title="Piano alimentare"
    [subtitle]="d.author + ' · ' + short(d.sentAt)"
    (close)="diet.set(null)"
  />
}
