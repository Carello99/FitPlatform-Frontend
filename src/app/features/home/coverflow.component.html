<div>
  <div
    (pointerdown)="onDown($event)" (pointermove)="onMove($event)" (pointerup)="onUp()" (pointercancel)="onUp()" (pointerleave)="onUp()"
    style="position:relative;height:180px;perspective:1000px;perspective-origin:50% 42%;touch-action:pan-y;user-select:none;-webkit-user-select:none;margin:4px -20px 0">

    @for (s of schede; track s.id; let i = $index) {
      <div (click)="focus(i)"
        [style.transform]="cardTransform(i)"
        [style.zIndex]="cardZ(i)"
        [style.opacity]="cardVisible(i) ? 1 : 0"
        [style.pointerEvents]="cardVisible(i) ? 'auto' : 'none'"
        [style.transition]="cardTransition(i)"
        style="position:absolute;left:50%;top:6px;width:164px;margin-left:-82px;transform-style:preserve-3d;cursor:pointer">

        <!-- cover face (originale) + autore in alto a sinistra -->
        <div [style.background]="coverBg(s)" [style.boxShadow]="coverShadow(s, isFront(i))"
          style="width:164px;height:164px;border-radius:20px;position:relative;overflow:hidden">
          <!-- watermark icona: segue la coda del gradiente (chiaro su copertina
               scura, scuro su copertina illuminata) -->
          <div style="position:absolute;right:-18px;bottom:-18px;opacity:0.18;color:var(--cover-watermark)">
            <i class="ti" [class]="s.icon" style="font-size:120px" aria-hidden="true"></i>
          </div>
          <!-- alto-sx: chi ha creato la scheda (coach = star, tu = utente) -->
          <div style="position:absolute;top:12px;left:12px" [title]="s.author === 'coach' ? 'Creata dal coach' : 'Creata da te'">
            <div style="width:40px;height:40px;border-radius:12px;background:rgba(0,0,0,0.28);display:flex;align-items:center;justify-content:center">
              @if (s.author === 'coach') {
                <i class="ic-mask ic-gym" style="font-size:22px;color:var(--on-accent)" aria-hidden="true"></i>
              } @else {
                <i class="ti ti-user" style="font-size:22px;color:var(--on-accent)" aria-hidden="true"></i>
              }
            </div>
          </div>
          <!-- Le carte laterali si spengono: velo scuro in tema scuro, chiaro in
               tema chiaro. Su fondo crema un velo nero non arretra la carta, la
               sporca. -->
          @if (!isFront(i)) {
            <div style="position:absolute;inset:0;background:var(--cover-veil)"></div>
          }
        </div>

        <!-- reflection: la mask sfuma proprio la CUCITURA (lato vicino alla carta)
             così non si vede più la riga netta; il riflesso resta sotto, tenue.
             L'opacità è theme-aware (token): in tema chiaro molto più bassa, così
             il riflesso scuro non lascia una macchia sul fondo crema. -->
        <div class="cover-reflect" [class.is-front]="isFront(i)"
          style="height:58px;margin-top:3px;overflow:hidden;transform:scaleY(-1);-webkit-mask-image:linear-gradient(to top, rgba(0,0,0,0.55), transparent 82%);mask-image:linear-gradient(to top, rgba(0,0,0,0.55), transparent 82%)">
          <!-- margin-top:-106 = 164-58 → nella finestra si vede il FONDO stondato
               della carta, così il riflesso ha gli angoli arrotondati come lei -->
          <div [style.background]="coverBg(s)"
            style="width:164px;height:164px;border-radius:20px;margin-top:-106px;position:relative;overflow:hidden">
          </div>
        </div>
      </div>
    }

    <!-- edge chevrons -->
    <button class="cf-nav left" (click)="$event.stopPropagation(); step(-1)" aria-label="Precedente">
      <i class="ti ti-chevron-left" aria-hidden="true"></i>
    </button>
    <button class="cf-nav right" (click)="$event.stopPropagation(); step(1)" aria-label="Successiva">
      <i class="ti ti-chevron-right" aria-hidden="true"></i>
    </button>
  </div>

  <!-- selected plan info + hint -->
  <!-- position:relative + z-index alto → il titolo (e la meta) stanno SOPRA il
       riflesso/ombra delle card, che altrimenti (z-index delle card) lo copre. -->
  <div style="text-align:center;margin-top:6px;position:relative;z-index:130">
    <div class="row center gap8" style="margin-bottom:4px">
<!--      @if (center.id === activeId) {
        <span class="badge badge-amber"><i class="ti ti-bolt-filled" style="font-size:11px" aria-hidden="true"></i>ATTIVA</span>
      } -->
      <h3 [style.color]="nameColor" style="font-size:21px;font-weight:800;letter-spacing:-0.5px;transition:color .35s cubic-bezier(.16,1,.3,1)">{{ center.name }}</h3>
    </div>
    <div style="font-size:13px;color:var(--ink-3);font-weight:600">{{ center.focus }}</div>
    <div class="row center gap14" style="margin:12px 0 14px;font-size:12.5px;font-weight:700;color:var(--ink-2)">
      <span class="row" style="gap:5px"><i class="ti ti-clock" style="font-size:15px;color:var(--ink-3)" aria-hidden="true"></i>{{ center.duration }} min</span>
      <span class="row" style="gap:5px"><i class="ti ti-list-numbers" style="font-size:15px;color:var(--ink-3)" aria-hidden="true"></i>{{ center.exercises.length }} eserc.</span>
      <span class="row" style="gap:5px"><i class="ti ti-stretching" style="font-size:15px;color:var(--ink-3)" aria-hidden="true"></i>{{ totalSets(center) }} serie</span>
    </div>
<!--     <button (click)="start.emit(center)"
      style="display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--ink-3);padding:8px 16px;border-radius:var(--r-pill);background:var(--surface-2);border:1px solid var(--hairline)">
      <i class="ti ti-hand-finger" style="font-size:15px;color:var(--ink-3)" aria-hidden="true"></i> Tocca la scheda per aprirla
    </button>-->
  </div>
</div>
